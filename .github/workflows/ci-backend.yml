name: CI Backend
on:
  push:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'apps/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r apps/backend/requirements.txt -r apps/backend/requirements-dev.txt
      - run: pytest -q apps/backend/tests
