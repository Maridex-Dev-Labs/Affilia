services:
  - type: web
    name: affilia-api
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_DOCS
        value: false
